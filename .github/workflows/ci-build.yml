name: CI Build

on:
  push:
    branches:
      - main
      - Lab4
  pull_request:
    branches:
      - main
      - Lab4
  workflow_dispatch:

jobs:
  backend_test:
    name: Backend Tests
    runs-on: ubuntu-latest
    env:
      SPRING_DATASOURCE_URL: jdbc:h2:mem:devdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.h2.Driver
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: ""
      SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
      SECURITY_JWT_SECRET: ${{ secrets.SECURITY_JWT_SECRET_CI }}
      SECURITY_JWT_EXPIRATION_MS: "3600000"
      APP_ADMIN_USERNAME: admin
      APP_ADMIN_EMAIL: admin@example.com
      APP_ADMIN_PASSWORD: ${{ secrets.APP_ADMIN_PASSWORD_CI }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run backend tests and coverage
        run: mvn -B clean verify

      - name: Check code coverage threshold (80%)
        run: |
          echo "Coverage threshold enforced by JaCoCo check goal in pom.xml (minimum 80% instruction coverage)."
          echo "If mvn verify passed, coverage is >= 80%."

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-test-results
          path: |
            target/surefire-reports/
            target/site/jacoco/
          if-no-files-found: warn

  backend_build:
    name: Build Backend JAR
    runs-on: ubuntu-latest
    needs: backend_test
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build backend JAR
        run: mvn -B clean package -DskipTests -Djacoco.skip=true

      - name: Upload backend JAR artifact
        uses: actions/upload-artifact@v7
        with:
          name: backend-jar
          path: target/devops_project-*.jar
          if-no-files-found: error

  frontend_test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: backend_build
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

  frontend_build:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: frontend_test
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error

  frontend_sonarqube_scan:
    name: SonarQube Frontend Scan
    runs-on: ubuntu-latest
    needs: frontend_build
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run coverage

      - name: SonarCloud Scan (Frontend)
        uses: sonarsource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: frontend
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=mariibykova_DevOpsProject_frontend
            -Dsonar.projectName=devops_project_frontend
            -Dsonar.sources=src
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.scm.provider=git
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300

  sonarqube_scan:
    name: SonarQube Backend Scan
    runs-on: ubuntu-latest
    needs: frontend_sonarqube_scan
    permissions:
      contents: read
      packages: read
    env:
      SPRING_DATASOURCE_URL: jdbc:h2:mem:devdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.h2.Driver
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: ""
      SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
      SECURITY_JWT_SECRET: ${{ secrets.SECURITY_JWT_SECRET_CI }}
      SECURITY_JWT_EXPIRATION_MS: "3600000"
      APP_ADMIN_USERNAME: admin
      APP_ADMIN_EMAIL: admin@example.com
      APP_ADMIN_PASSWORD: ${{ secrets.APP_ADMIN_PASSWORD_CI }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run tests and generate coverage report for SonarQube
        run: mvn -B verify -DskipTests=false

      - name: SonarCloud Scan
        uses: sonarsource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
        with:
          projectBaseDir: .
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.projectName=devops_project_backend
            -Dsonar.sources=src/main/java
            -Dsonar.tests=src/test/java
            -Dsonar.java.binaries=target/classes
            -Dsonar.java.test.binaries=target/test-classes
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.java.coveragePlugin=jacoco
            -Dsonar.jacoco.reportPaths=target/jacoco.exec
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
            -Dsonar.test.inclusions=src/test/java/**/*Test.java
            -Dsonar.scm.provider=git
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300

      - name: Upload SonarQube report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sonar-report
          path: target/sonar/
          if-no-files-found: warn

  push_images:
    name: Build & Push Docker Images to GHCR
    runs-on: ubuntu-latest
    needs: sonarqube_scan
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Download backend JAR artifact
        uses: actions/download-artifact@v7
        with:
          name: backend-jar
          path: target

      - name: Download frontend dist artifact
        uses: actions/download-artifact@v7
        with:
          name: frontend-dist
          path: frontend-dist

      - name: Normalize backend artifact layout
        run: |
          mkdir -p target
          JAR_PATH="$(find target -type f -name '*.jar' ! -name '*.jar.original' | head -n 1)"
          if [ -z "$JAR_PATH" ]; then
            echo "Backend JAR artifact not found"
            exit 1
          fi
          cp "$JAR_PATH" target/app.jar

      - name: Normalize frontend artifact layout
        run: |
          if [ -d frontend-dist/frontend/dist ]; then
            cp -R frontend-dist/frontend/dist/. frontend-dist/
          elif [ -d frontend-dist/dist ]; then
            cp -R frontend-dist/dist/. frontend-dist/
          fi
          if [ ! -f frontend-dist/index.html ]; then
            echo "Frontend dist artifact does not contain index.html"
            exit 1
          fi

      - name: Create frontend runtime Dockerfile
        run: |
          printf 'FROM nginx:1.29-alpine\nCOPY frontend-dist/ /usr/share/nginx/html/\nCOPY frontend/nginx.conf /etc/nginx/conf.d/default.conf\nEXPOSE 80\n' > Dockerfile.frontend.artifact

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image names
        id: images
        run: |
          REPO_LOWER="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "backend=ghcr.io/${REPO_LOWER}" >> "$GITHUB_OUTPUT"
          echo "frontend=ghcr.io/${REPO_LOWER}" >> "$GITHUB_OUTPUT"

      - name: Extract backend Docker metadata
        id: backend_meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.images.outputs.backend }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract frontend Docker metadata
        id: frontend_meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.images.outputs.frontend }}
          tags: |
            type=raw,value=frontend-sha-${{ github.sha }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.backend_meta.outputs.tags }}
          labels: ${{ steps.backend_meta.outputs.labels }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.frontend.artifact
          push: true
          tags: ${{ steps.frontend_meta.outputs.tags }}
          labels: ${{ steps.frontend_meta.outputs.labels }}

  update_gitops_manifests:
    name: Deploy to Kubernetes via GitOps
    runs-on: ubuntu-latest
    needs: push_images
    permissions:
      contents: read
      packages: read
    env:
      TF_VAR_twc_token: ${{ secrets.TF_VAR_TWC_TOKEN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.TF_S3_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_S3_SECRET_KEY }}
      TF_S3_BUCKET: ${{ secrets.TF_S3_BUCKET }}
      GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      SECURITY_JWT_SECRET: ${{ secrets.SECURITY_JWT_SECRET_CI }}
      APP_ADMIN_USERNAME: ${{ secrets.APP_ADMIN_USERNAME }}
      APP_ADMIN_EMAIL: ${{ secrets.APP_ADMIN_EMAIL }}
      APP_ADMIN_PASSWORD: ${{ secrets.APP_ADMIN_PASSWORD_CI }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Build kubeconfig from Terraform output
        working-directory: terraform
        env:
          S3_ACCESS_KEY: ${{ secrets.TF_S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.TF_S3_SECRET_KEY }}
        run: |
          terraform init -input=false \
            -backend-config="bucket=${TF_S3_BUCKET}" \
            -backend-config="access_key=${S3_ACCESS_KEY}" \
            -backend-config="secret_key=${S3_SECRET_KEY}"
          terraform output -raw kubeconfig > "$RUNNER_TEMP/kubeconfig"
          chmod 600 "$RUNNER_TEMP/kubeconfig"
          echo "KUBECONFIG=$RUNNER_TEMP/kubeconfig" >> "$GITHUB_ENV"

      - name: Create namespace
        run: kubectl apply -f kubernetes/namespace.yaml

      - name: Install ingress-nginx controller
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.12.3/deploy/static/provider/cloud/deploy.yaml
          kubectl -n ingress-nginx rollout status deployment/ingress-nginx-controller --timeout=300s

      - name: Configure ingress-nginx
        run: |
          CURRENT_HOST_NETWORK=$(kubectl -n ingress-nginx get deployment ingress-nginx-controller -o jsonpath='{.spec.template.spec.hostNetwork}' 2>/dev/null || echo "false")
          if [ "$CURRENT_HOST_NETWORK" != "true" ]; then
            kubectl -n ingress-nginx patch deployment ingress-nginx-controller --type='merge' -p '{"spec":{"template":{"spec":{"hostNetwork":true,"dnsPolicy":"ClusterFirstWithHostNet"}}}}'
            kubectl -n ingress-nginx patch service ingress-nginx-controller --type='merge' -p '{"spec":{"type":"ClusterIP"}}'
            kubectl -n ingress-nginx rollout status deployment/ingress-nginx-controller --timeout=300s
          else
            echo "ingress-nginx already configured with hostNetwork, skipping patch"
          fi

      - name: Create or update image pull secret
        run: |
          if [ -z "$GHCR_PULL_TOKEN" ]; then
            echo "GHCR_PULL_TOKEN secret is required to pull private images from GHCR in Kubernetes"
            exit 1
          fi
          kubectl -n lab03 create secret docker-registry ghcr-creds \
            --docker-server=ghcr.io \
            --docker-username="${{ github.actor }}" \
            --docker-password="$GHCR_PULL_TOKEN" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create or update application secrets
        run: |
          SPRING_DATASOURCE_URL="jdbc:postgresql://postgres.lab03.svc.cluster.local:5432/$POSTGRES_DB"
          kubectl -n lab03 create secret generic app-secrets \
            --from-literal=POSTGRES_DB="$POSTGRES_DB" \
            --from-literal=POSTGRES_USER="$POSTGRES_USER" \
            --from-literal=POSTGRES_PASSWORD="$POSTGRES_PASSWORD" \
            --from-literal=SPRING_DATASOURCE_URL="$SPRING_DATASOURCE_URL" \
            --from-literal=SPRING_DATASOURCE_USERNAME="$POSTGRES_USER" \
            --from-literal=SPRING_DATASOURCE_PASSWORD="$POSTGRES_PASSWORD" \
            --from-literal=SECURITY_JWT_SECRET="$SECURITY_JWT_SECRET" \
            --from-literal=APP_ADMIN_USERNAME="$APP_ADMIN_USERNAME" \
            --from-literal=APP_ADMIN_EMAIL="$APP_ADMIN_EMAIL" \
            --from-literal=APP_ADMIN_PASSWORD="$APP_ADMIN_PASSWORD" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Resolve storage class for postgres PVC
        id: storage
        run: |
          DEFAULT_SC=$(kubectl get storageclass -o jsonpath='{range .items[?(@.metadata.annotations.storageclass\.kubernetes\.io/is-default-class=="true")]}{.metadata.name}{"\n"}{end}' | head -n1)
          if [ -z "$DEFAULT_SC" ]; then
            DEFAULT_SC=$(kubectl get storageclass -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
          fi
          if [ -z "$DEFAULT_SC" ]; then
            echo "No StorageClass found. Falling back to static PV with storageClassName=manual"
            DEFAULT_SC="manual"
            echo "use_static_pv=true" >> "$GITHUB_OUTPUT"
          else
            echo "use_static_pv=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Using StorageClass: $DEFAULT_SC"
          echo "POSTGRES_STORAGE_CLASS=$DEFAULT_SC" >> "$GITHUB_ENV"

      - name: Apply static PV fallback
        if: ${{ steps.storage.outputs.use_static_pv == 'true' }}
        run: kubectl apply -f kubernetes/postgres-pv.yaml

      - name: Recreate PVC if storageClassName changed
        run: |
          CURRENT_SC=$(kubectl -n lab03 get pvc postgres-pvc -o jsonpath='{.spec.storageClassName}' 2>/dev/null || true)
          if [ "$CURRENT_SC" = "<no value>" ]; then
            CURRENT_SC=""
          fi
          # If PVC exists with a non-empty storageClassName (e.g. "manual"), delete it so it can be recreated without one
          if [ -n "$CURRENT_SC" ]; then
            echo "Deleting pvc/postgres-pvc with storageClassName=$CURRENT_SC to recreate without storageClassName"
            kubectl -n lab03 delete pvc postgres-pvc --ignore-not-found=true
            # Wait for postgres pod to terminate before PVC can be deleted
            kubectl -n lab03 delete pod -l app=postgres --ignore-not-found=true
            sleep 5
          fi

      - name: Apply postgres manifests
        run: |
          kubectl apply -f kubernetes/frontend-nginx-config.yaml
          kubectl apply -f kubernetes/postgres.yaml

      - name: Wait for postgres PVC to bind
        run: kubectl -n lab03 wait --for=jsonpath='{.status.phase}'=Bound pvc/postgres-pvc --timeout=180s

      - name: Wait for postgres rollout
        run: kubectl -n lab03 rollout status deployment/postgres --timeout=360s

      - name: Apply backend and frontend manifests
        run: |
          REPO_LOWER="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          BACKEND_IMAGE="ghcr.io/${REPO_LOWER}:sha-${{ github.sha }}"
          FRONTEND_IMAGE="ghcr.io/${REPO_LOWER}:frontend-sha-${{ github.sha }}"
          sed "s|__BACKEND_IMAGE__|$BACKEND_IMAGE|g" kubernetes/backend.yaml | kubectl apply -f -
          sed "s|__FRONTEND_IMAGE__|$FRONTEND_IMAGE|g" kubernetes/frontend.yaml | kubectl apply -f -
          kubectl apply -f kubernetes/monitoring.yaml
          kubectl -n lab03 rollout restart deployment/prometheus
          kubectl -n lab03 rollout status deployment/prometheus --timeout=240s
          kubectl apply -f kubernetes/ingress.yaml

      - name: Wait for rollout
        run: |
          kubectl -n lab03 rollout status deployment/app --timeout=240s
          kubectl -n lab03 rollout status deployment/frontend --timeout=180s

      - name: Kubernetes diagnostics on failure
        if: failure()
        run: |
          kubectl -n lab03 get pvc,pods,deploy,svc -o wide || true
          kubectl -n lab03 describe pvc postgres-pvc || true
          kubectl -n lab03 describe deployment postgres || true
          kubectl -n lab03 describe pod -l app=postgres || true
          kubectl -n lab03 logs deployment/postgres --all-containers=true --tail=200 || true
          kubectl -n lab03 get events --sort-by=.lastTimestamp | tail -n 100 || true

      - name: Show services
        run: |
          kubectl -n lab03 get svc -o wide
          kubectl -n ingress-nginx get svc ingress-nginx-controller -o wide
          kubectl -n lab03 get ingress -o wide

  notify_pipeline:
    name: Send Telegram Notification
    runs-on: ubuntu-latest
    needs:
      - backend_test
      - backend_build
      - frontend_test
      - frontend_build
      - frontend_sonarqube_scan
      - sonarqube_scan
      - push_images
      - update_gitops_manifests
    if: always()
    steps:
      - name: Send Telegram Notification - Pipeline Status
        run: |
          if [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ] && [ -n "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            BACK_TEST="${{ needs.backend_test.result == 'success' && 'PASSED' || 'FAILED' }}"
            BACK_BUILD="${{ needs.backend_build.result == 'success' && 'PASSED' || 'FAILED' }}"
            FRONT_TEST="${{ needs.frontend_test.result == 'success' && 'PASSED' || 'FAILED' }}"
            FRONT_BUILD="${{ needs.frontend_build.result == 'success' && 'PASSED' || 'FAILED' }}"
            FRONT_SONAR="${{ needs.frontend_sonarqube_scan.result == 'success' && 'PASSED' || 'FAILED' }}"
            BACK_SONAR="${{ needs.sonarqube_scan.result == 'success' && 'PASSED' || 'FAILED' }}"
            PUSH="${{ needs.push_images.result == 'success' && 'PASSED' || 'FAILED' }}"
            DEPLOY="${{ needs.update_gitops_manifests.result == 'success' && 'PASSED' || 'FAILED' }}"

            if [ "${{ needs.update_gitops_manifests.result }}" = "success" ]; then
              OVERALL="ALL CHECKS PASSED"
            else
              OVERALL="SOME CHECKS FAILED"
            fi

            TEXT="CI/CD Pipeline - ${{ github.repository }} branch=${{ github.ref_name }} run=${{ github.run_number }} | backend_test=${BACK_TEST} | backend_build=${BACK_BUILD} | frontend_test=${FRONT_TEST} | frontend_build=${FRONT_BUILD} | frontend_sonarqube=${FRONT_SONAR} | backend_sonarqube=${BACK_SONAR} | push_images=${PUSH} | deploy=${DEPLOY} | Overall: ${OVERALL} | ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d "text=${TEXT}"
          fi
