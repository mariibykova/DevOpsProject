name: Terraform Kubernetes

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform for Kubernetes
    runs-on: ubuntu-latest
    concurrency:
      group: terraform-kubernetes03
      cancel-in-progress: false
    defaults:
      run:
        working-directory: terraform
    env:
      TF_VAR_twc_token: ${{ secrets.TF_VAR_TWC_TOKEN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.TF_S3_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_S3_SECRET_KEY }}
      TF_S3_BUCKET: ${{ secrets.TF_S3_BUCKET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform fmt
        run: terraform fmt -recursive

      - name: Terraform init
        run: terraform init -input=false -backend-config="bucket=${TF_S3_BUCKET}"

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -input=false -out=tfplan

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve tfplan
