name: SonarQube Security Scan

on:
  workflow_run:
    workflows:
      - CI Build Test VM
    types:
      - completed
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to scan'
        required: false
        default: main

jobs:
  sonarcloud-scan:
    name: SonarQube Security & Quality Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      # Backend environment
      SPRING_DATASOURCE_URL: jdbc:h2:mem:devdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.h2.Driver
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: ""
      SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
      SECURITY_JWT_SECRET: ${{ secrets.SECURITY_JWT_SECRET_CI }}
      SECURITY_JWT_EXPIRATION_MS: "3600000"
      APP_ADMIN_USERNAME: admin
      APP_ADMIN_EMAIL: admin@example.com
      APP_ADMIN_PASSWORD: ${{ secrets.APP_ADMIN_PASSWORD_CI }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.event.inputs.branch || github.sha }}
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Node.js for frontend scan
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build backend for SonarQube
        run: ./mvnw -B compile

      - name: SonarCloud Scan for Backend
        uses: sonarsource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
        with:
          projectBaseDir: .
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.projectName=devops_project_backend
            -Dsonar.sources=src/main/java
            -Dsonar.tests=src/test/java
            -Dsonar.java.binaries=target/classes
            -Dsonar.java.test.binaries=target/test-classes
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.java.coveragePlugin=jacoco
            -Dsonar.jacoco.reportPaths=target/jacoco.exec
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
            -Dsonar.test.inclusions=src/test/java/**/*Test.java
            -Dsonar.scm.provider=git
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300

      - name: SonarCloud Scan for Frontend
        uses: sonarsource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}_frontend
        with:
          projectBaseDir: frontend
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}_frontend
            -Dsonar.projectName=devops_project_frontend
            -Dsonar.sources=src
            -Dsonar.tests=src/__tests__
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300

      - name: Check Quality Gate Status
        run: |
          echo "SonarQube Quality Gate check completed"
          echo "If this step runs, it means quality gates passed"

      - name: Upload SonarQube Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sonar-report
          path: |
            target/sonar/
            frontend/coverage/
          if-no-files-found: warn

  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    needs: sonarcloud-scan
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.event.inputs.branch || github.sha }}

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Run OWASP Dependency Check (Backend)
        run: ./mvnw -B org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=7

      - name: Upload OWASP Report (Backend)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: owasp-report-backend
          path: target/dependency-check-report.html
          if-no-files-found: warn

      - name: Run npm audit (Frontend)
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  telegram-notification-scan:
    name: Send SonarQube Results to Telegram
    runs-on: ubuntu-latest
    needs: [sonarcloud-scan, security-scan]
    if: always()
    steps:
      - name: Send Telegram Notification
        run: |
          if [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ] && [ -n "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            SQ_STATUS="${{ needs.sonarcloud-scan.result == 'success' && 'PASSED' || 'FAILED' }}"
            SEC_STATUS="${{ needs.security-scan.result == 'success' && 'PASSED' || 'FAILED' }}"
            OVERALL="${{ needs.sonarcloud-scan.result == 'success' && needs.security-scan.result == 'success' && 'ALL CHECKS PASSED' || 'SOME CHECKS FAILED' }}"
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d "text=SonarQube Results - Quality Gate: ${SQ_STATUS} - Security: ${SEC_STATUS} - Overall: ${OVERALL} - Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
