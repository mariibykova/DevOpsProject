---
- name: Deploy DevOps Application with Docker Compose
  hosts: servers
  become: true

  vars:
    deploy_dir: /opt/devops_app

  tasks:
    - name: Install required apt packages
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: true

    - name: Ensure Docker keyrings directory exists
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Docker official GPG key
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Add Docker apt repository
      apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable"
        state: present

    - name: Install Docker engine and Compose plugin
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Ensure Docker service is enabled and running
      service:
        name: docker
        state: started
        enabled: true

    - name: Create deployment directory
      file:
        path: "{{ deploy_dir }}"
        state: directory
        mode: "0755"

    - name: Copy docker-compose.yml
      copy:
        src: "{{ playbook_dir }}/../docker-compose.yml"
        dest: "{{ deploy_dir }}/docker-compose.yml"
        mode: "0644"

    - name: Create .env file with environment variables
      template:
        src: "{{ playbook_dir }}/env.j2"
        dest: "{{ deploy_dir }}/.env"
        mode: "0600"

    - name: Login to GitHub Container Registry
      shell: |
        echo "{{ ghcr_token }}" | docker login ghcr.io -u "{{ ghcr_username }}" --password-stdin
      no_log: true
      changed_when: false
      register: docker_login

    - name: Login to Docker Hub
      shell: echo "{{ docker_hub_token }}" | docker login -u "{{ docker_hub_username }}" --password-stdin

    - name: Start Docker Compose services
      command: docker compose up -d --remove-orphans
      args:
        chdir: "{{ deploy_dir }}"

    - name: Health check - verify application is responding
      uri:
        url: "http://localhost:{{ app_port | default('8080') }}/actuator/health"
        method: GET
        status_code: 200
      register: health_check
      retries: 5
      delay: 5
      until: health_check.status == 200